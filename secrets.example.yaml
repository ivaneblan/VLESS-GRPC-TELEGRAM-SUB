# Скопируйте в secrets.yaml (vpnctl init делает это автоматически).
# Только CLI: заполните только servers.<id>.password.
# С Telegram-ботом: также укажите telegram.bot_token.
# SSH-ключи: vpnctl init → keys/id_ed25519 (здесь не хранятся).
# SSH host keys (TOFU): keys/known_hosts — создаётся при первом подключении vpnctl/tgbot.
# Reality-ключи: заполняются автоматически через vpnctl bootstrap / vpnctl vless.

telegram:
  bot_token: PASTE_TELEGRAM_BOT_TOKEN   # опционально для режима только CLI (--no-bot)

servers:
  de:
    password: ROOT_PASSWORD
  es:
    password: ROOT_PASSWORD
